services:
  ### API Gateway
  api-gateway:
    container_name: api-gateway
    build:
      context: ./api-gateway/
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - ${GATEWAY_PORT}:${GATEWAY_PORT}
    restart: unless-stopped
    networks:
      - springcloud

  ### Discovery Server
  discovery-server:
    container_name: discovery-server
    build:
      context: ./discovery-server/
      dockerfile: Dockerfile
    #image: georgegxx/discovery-server:latest
    env_file:
      - .env
    ports:
      - ${DISCOVERY_PORT}:${DISCOVERY_PORT}
    restart: unless-stopped
    networks:
      - springcloud

  ### Inventory Service
  inventory-service:
    container_name: inventory-service
    build:
      context: ./inventory-service/
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - ${PORT}:${PORT}
    restart: unless-stopped
    networks:
      - springcloud
    depends_on:
      - kafka
      - db-inventory
  ### Postgres database for inventory
  db-inventory:
    container_name: db-inventory
    image: "postgres:${POSTGRES_VERSION}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - inventory-pgdata:/var/lib/postgresql/data
    ports:
      - "15432:${POSTGRES_PORT}"
    networks:
      - springcloud
    # expose:
    #   - 5431
    # command: -p 5431

  ### Notification Service
  notification-service:
    container_name: notification-service
    build:
      context: ./notification-service/
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - ${PORT}:${PORT}
    restart: unless-stopped
    networks:
      - springcloud
    depends_on:
      - kafka

  ### Orders Service
  orders-service:
    container_name: orders-service
    build:
      context: ./orders-service/
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - ${PORT}:${PORT}
    restart: unless-stopped
    networks:
      - springcloud
    depends_on:
      - kafka
      - db-orders
  ### MySQL database for orders
  db-orders:
    container_name: db-orders
    image: "mysql:${MYSQL_VERSION}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      #MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - orders-mydata:/var/lib/mysql
    ports:
      - "13306:${MYSQL_PORT}"
    networks:
      - springcloud
    # expose:
    #   - 3307

  ### Products Service
  products-service:
    container_name: products-service
    build:
      context: ./products-service/
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - ${PORT}:{PORT}
    restart: unless-stopped
    networks:
      - springcloud
    depends_on:
      - kafka
      - db-products
  ### Postgres database for products
  db-products:
    container_name: db-products
    image: "postgres:${PRODUCTS_POSTGRES_VERSION}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PRODUCTS_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - products-pgdata:/var/lib/postgresql/data
    ports:
      - "15433:${PRODUCTS_POSTGRES_PORT}"
    networks:
      - springcloud
    # expose:
    #   - 5433
    # command: -p 5433

  ### Keycloak
  keycloak:
    container_name: keycloak
    image: "quay.io/keycloak/keycloak:${KEYCLOACK_VERSION}"
    command: [ "start-dev" ]
    restart: unless-stopped
    ports:
      - ${KEYCLOACK_PORT}:${KEYCLOAK_PORT}
    networks:
      - springcloud
    # expose:
    #   - 8181
    depends_on:
      - db-keycloak
    env_file:
      - .env
    environment:
      DB_VENDOR: ${DB_VENDOR}
      DB_ADDR: ${DB_ADDR}
      DB_DATABASE: ${KEYCLOAK_POSTGRES_DB}
      DB_PORT: ${KEYCLOAK_POSTGRES_PORT}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOACK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOACK_ADMIN_PASSWORD}
      KC_HTTP_PORT: ${KC_HTTP_PORT}
  ### Posgres database for Keycloak
  db-keycloak:
    container_name: db-keycloak
    image: "postgres:${KEYLOAK_POSTGRES_VERSION}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - keycloak-pgdata:/var/lib/postgresql/data
    ports:
      - 15434:5434
    networks:
      - springcloud
    # expose:
    #   - 5434
    # command: -p 5434

  ### ZooKeeper
  zookeeper:
    container_name: zookeeper
    image: "confluentinc/cp-zookeeper:${ZOOKEEPER_VERSION}"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME}
    networks:
      - springcloud

  ### Kafka Broker
  kafka:
    container_name: kafka
    image: "confluentinc/cp-kafka:${KAFKA_VERSION}"
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
    networks:
      - springcloud
    env_file:
      - .env
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_ZOOKEEPER_CONNECT: ${KAFKA_ZOOKEEPER_CONNECT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}

volumes:
  inventory-pgdata:
  orders-mydata:
  products-pgdata:
  keycloak-pgdata:

networks:
  springcloud:
