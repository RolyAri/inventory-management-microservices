spring.application.name=${NOTIFICATION_SERVICE_NAME}
#server.port=${PORT:0}
server.port=0

#Eureka client
eureka.client.service-url.defaultZone=${DISCOVERY_AUTH_URL}
#eureka.client.service-url.default-zone=http://eureka:password@localhost:8761/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

#Actuator
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator/notifications

# Otel
management.tracing.enabled=true
# si usas bridge y exporter en app:
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
management.tracing.sampling.probability=1.0
# service name (si no lo pones, agent puede inferirlo)
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}
otel.resource.attributes=service.name=${NOTIFICATION_SERVICE_NAME},service.version=1.0

#Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
#spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Redis
#spring.cache.type=${REDIS_HOST}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}